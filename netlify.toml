# Netlify configuration for the Papoyee project

[build]
  # Build command - Vite will handle the React build
  command = "npm install --legacy-peer-deps && npm run build"
  
  # Directory to deploy (Vite outputs to dist/)
  publish = "dist"

[build.environment]
  # Node version to use
  NODE_VERSION = "22.22.1"
  # Use legacy peer deps to handle next-themes React 19 compatibility
  NPM_FLAGS = "--legacy-peer-deps"

# Redirect trailing slashes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache rules for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
